rules:
  - name: Azure Connection String
    id: kingfisher.azure.1
    pattern: |
      (?xi)
      (?: AccountName | SharedAccessKeyName | SharedSecretIssuer) \s*=\s* ([^;]{1,80}) \s*;\s*
      .{0,10}\s*
      (?: AccountKey | SharedAccessKey | SharedSecretValue) \s*=\s* ([^;]{1,100})
      (?: ;|$ )
    min_entropy: 3.3
    confidence: medium
    examples:
      - |
        # Azure Storage Connection String
        AzureWebJobsStorage=DefaultEndpointsProtocol=https;AccountName=hanatour9833;AccountKey=6jqh42QQjWWBwoPGGR/Jr0PZjhBMZVbHm/gkhEfHvOj8aV6+oI8ed6ZAAwB5a6993WqyQDiuJJB0QpseJwqYxw==;EndpointSuffix=core.windows.net
      - |
        DefaultEndpointsProtocol=http;AccountName=testacc1;
        AccountKey=1gy3lpE7Du1j5ljKiupgKzywSw2isjsa69sfsdfsdsgfsgfdgfdgfd/YThisv/OVVLfIOv9kQ==;
        BlobEndpoint=http://127.0.0.1:8440/testacc1;
        TableEndpoint=http://127.0.0.1:8440/testacc1;
        QueueEndpoint=http://127.0.0.1:8440/testacc1;
      - |
        "IOTHUB_CONNECTION_STRING": {
          "value": "HostName=d1-vi-ioth521.azure-devices.net;SharedAccessKeyName=registryReadWrite;SharedAccessKey=S8ii67l3Gd1Ba69az78iP9UksewzhjvUfh1DIuDs30w="
        }
      - |
        "AZURE_STORAGE_CONNECTION_STRING": {
          "value": "DefaultEndpointsProtocol=https;AccountName=d1biblobstor521;AccountKey=NjEwGHd9+piK+iCi2C2XURWPmeDDjif9UKN1HAszYptL4iQ+yD7/dgjLMZc3VOpURsa53aJ4HZfbVWzL429C5g==;EndpointSuffix=core.windows.net"
        }
    references:
      - https://azure.microsoft.com/en-us/blog/windows-azure-web-sites-how-application-strings-and-connection-strings-work/
      - https://docs.microsoft.com/en-us/azure/storage/common/storage-configure-connection-string
      - https://learn.microsoft.com/en-us/azure/service-bus-messaging/service-bus-sas#best-practices-when-using-sas

  - name: Azure App Configuration Connection String
    id: kingfisher.azure.2
    pattern: |
      (?xi)
      (https://[A-Z0-9-]+\.azconfig\.io);
      Id=(.{4}-.{2}-.{2}:[A-Z0-9+/]{18,22});
      Secret=([A-Z0-9+/]{36,50}=)
    min_entropy: 3.3
    confidence: medium
    examples:
      - 'Endpoint=https://foo-nonprod-appconfig.azconfig.io;Id=ABCD-E6-s0:tl6ABcdefGHi7kLMno/p;Secret=abCD1EF+GHIJxLMnOPqRSa53VWX05zaBCdE/fg9hi4k='
      - 'https://foo-nonprod-appconfig.azconfig.io;Id=ABCD-E6-s0:tl6ABcdefGHi7kLMno/p;Secret=abCD1EF+GHIJxLMnOA53ST8uVWX05zaBCdE/fg9hi4k='
      - 'Endpoint=https://appconfig-test01.azconfig.io;Id=09pv-l0-s0:opFCQMC6+9485xJgN5Ws;Secret=GcoEA53t7GLRNJ910M46IrbHO/Vg0tt4HujRdsaCoTY='
      - '        private static string appConfigurationConnectionString = "Endpoint=https://appcs-fg-pwc.azconfig.io;Id=pi5x-l9-s0:SZLlhHA53Nz2MpAl04cU;Secret=CQ+mlfQqkzfZv4XA53gigJ/seeXMKwNsqW/rM3wmtuE=";'
    references:
      - https://docs.microsoft.com/en-us/azure/azure-app-configuration/
      - https://docs.microsoft.com/en-us/azure/azure-app-configuration/howto-best-practices
      - https://github.com/Azure/azure-sdk-for-python/blob/main/sdk/appconfiguration/azure-appconfiguration/azure/appconfiguration/_utils.py

  - name: Azure Personal Access Token
    id: kingfisher.azure.3
    pattern: |
      (?xi)
      (?i: ADO_PAT | pat_token | personal_?access_?token | \$token )
      \s* = \s*
      ["']
      ([a-z0-9]{52})
      ["']
    min_entropy: 3.3
    confidence: medium
    examples:
      - |
        var personalAccessToken = "zpczok4kqgnw5prpfy3ehiylbqvgbjfkdiqkejsxqamy7qbkep7q";  // Provide a value or retrieve it from configuration
      - |
        $token = "58oo4mvqr2tpw7b4w3loeckwfu5o6nw3sihfckvlwoxgqimlddza"
      - |
        if __name__ == "__main__":
            ado_pat =  "iyfmob6xjrfmit67anxbot64umfx2clwx7dz5ynxi4q2z3uqegvq"
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://app.vssps.visualstudio.com/_apis/profile/profiles/me?api-version=7.1
          headers:
            Authorization: 'Basic {{ ":" | append: TOKEN | b64enc }}'
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              match_all_words: true
              words:
                - '"id"'
                - '"displayName"'
    # Revocation not added: Azure DevOps PAT lifecycle management is documented
    # separately and is not a self-revoke flow driven solely by the PAT itself.
    references:
      - https://learn.microsoft.com/en-us/azure/devops/organizations/accounts/use-personal-access-tokens-to-authenticate?view=azure-devops
      - https://learn.microsoft.com/en-us/rest/api/azure/devops/profile/profiles/get?view=azure-devops-rest-7.1
  - name: Azure Container Registry URL
    id: kingfisher.azure.4
    pattern: |
      (?xi)
      (
        [a-z0-9][a-z0-9-]{1,100}[a-z0-9]
      )\.azurecr\.io
    confidence: medium
    visible: false
    min_entropy: 2.0
    examples:
      - "myregistry.azurecr.io"
  - name: Azure Container Registry Password
    id: kingfisher.azure.5
    pattern: |
      (?xi)
      \b
      (
        [A-Z0-9+/]{42}\+ACR[A-Z0-9]{6}
      )
      \b
    pattern_requirements:
      min_digits: 2
    confidence: medium
    min_entropy: 4.0
    validation:
      type: Http
      content:
        request:
          method: GET
          url: "https://{{ACR_USERNAME}}.azurecr.io/v2/_catalog"
          headers:
            Authorization: "Basic {{ ACR_USERNAME | append: ':' | append: TOKEN | b64enc }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
    examples:
      - "Abcdefghijklmnopqrstuvwxyz123456789012ABCD+ACRefg123"
    depends_on_rule:
      - rule_id: "kingfisher.azure.4"
        variable: ACR_USERNAME
    references:
      - https://learn.microsoft.com/en-us/azure/container-registry/container-registry-authentication

  - name: Azure AD Client Secret (Microsoft Entra ID)
    id: kingfisher.azure.6
    pattern: |
      (?x)
      (?:^|['"\x60\s>=:(,])
      (
        [a-zA-Z0-9_~.]{3}
        \d
        Q~
        [a-zA-Z0-9_~.\-]{31,34}
      )
      (?:$|['"\x60\s<),])
    pattern_requirements:
      min_digits: 1
    min_entropy: 3.5
    confidence: medium
    examples:
      - '"aBc4Q~xY9kLmNpQrStUvWxYz01234567890abcd"'
      - 'AZURE_CLIENT_SECRET=xY14Q~abcdefghijklmnopqrstuvwxyz01234'
    validation:
      type: Http
      content:
        request:
          method: POST
          url: "https://login.microsoftonline.com/{{ AZURE_TENANT_ID }}/oauth2/v2.0/token"
          headers:
            Content-Type: application/x-www-form-urlencoded
          body: "client_id={{ AZURE_CLIENT_ID | url_encode }}&client_secret={{ TOKEN | url_encode }}&scope=https%3A%2F%2Fgraph.microsoft.com%2F.default&grant_type=client_credentials"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"access_token"'
    depends_on_rule:
      - rule_id: kingfisher.azure.7
        variable: AZURE_TENANT_ID
      - rule_id: kingfisher.azure.8
        variable: AZURE_CLIENT_ID
    references:
      - https://learn.microsoft.com/en-us/entra/identity-platform/quickstart-register-app
      - https://learn.microsoft.com/en-us/entra/identity-platform/v2-oauth2-client-creds-grant-flow

  - name: Microsoft Entra Tenant ID
    id: kingfisher.azure.7
    pattern: |
      (?xi)
      \b
      (?:
        AZURE[\s._-]*TENANT[\s._-]*ID
        | ARM[\s._-]*TENANT[\s._-]*ID
        | ENTRA[\s._-]*TENANT[\s._-]*ID
        | AAD[\s._-]*TENANT[\s._-]*ID
        | (?:
            AzureAd
            | MicrosoftIdentity
            | Entra
          )
          (?:.|[\n\r]){0,80}?
          (?: tenantId | tenant_id )
        | tenant ["']
      )
      (?:.|[\n\r]){0,16}?
      (?: = | : | => )
      \s*
      ["']?
      (
        [0-9a-f]{8}
        -
        [0-9a-f]{4}
        -
        [0-9a-f]{4}
        -
        [0-9a-f]{4}
        -
        [0-9a-f]{12}
      )
      \b
    min_entropy: 2.5
    confidence: medium
    visible: false
    examples:
      - 'AZURE_TENANT_ID="72f988bf-86f1-41af-91ab-2d7cd011db47"'
      - '"tenant": "11111111-2222-4333-8444-555555555555"'
      - 'AzureAd: { tenantId: aaaaaaaa-bbbb-4ccc-8ddd-eeeeeeeeeeee }'
    references:
      - https://learn.microsoft.com/en-us/entra/fundamentals/how-to-find-tenant

  - name: Microsoft Entra Application Client ID
    id: kingfisher.azure.8
    pattern: |
      (?xi)
      \b
      (?:
        AZURE[\s._-]*CLIENT[\s._-]*ID
        | ARM[\s._-]*CLIENT[\s._-]*ID
        | ENTRA[\s._-]*CLIENT[\s._-]*ID
        | AAD[\s._-]*CLIENT[\s._-]*ID
        | (?:
            AzureAd
            | MicrosoftIdentity
            | Entra
          )
          (?:.|[\n\r]){0,80}?
          (?: clientId | client_id )
        | appId
      )
      (?:.|[\n\r]){0,16}?
      (?: = | : | => )
      \s*
      ["']?
      (
        [0-9a-f]{8}
        -
        [0-9a-f]{4}
        -
        [0-9a-f]{4}
        -
        [0-9a-f]{4}
        -
        [0-9a-f]{12}
      )
      \b
    min_entropy: 2.5
    confidence: medium
    visible: false
    examples:
      - 'AZURE_CLIENT_ID="00001111-aaaa-4222-bbbb-3333cccc4444"'
      - '"appId": "12345678-90ab-4cde-8f01-234567890abc"'
      - 'AzureAd: { clientId: fedcba98-7654-4321-8fed-cba987654321 }'
    references:
      - https://learn.microsoft.com/en-us/entra/identity-platform/quickstart-register-app

  - name: Microsoft Entra Contextual Client Secret
    id: kingfisher.azure.9
    pattern: |
      (?xi)
      \b
      (?:
        (?:
          AZURE
          | ARM
          | ENTRA
          | AAD
          | MICROSOFT
        )
        [A-Z0-9._\s-]{0,24}
        (?:
          CLIENT[\s._-]*SECRET
          | APP[\s._-]*SECRET
          | APPLICATION[\s._-]*PASSWORD
          | PASSWORD
        )
        |
        appId
        (?:.|[\n\r]){0,160}?
        password
        |
        (?:
          AzureAd
          | MicrosoftIdentity
          | Entra
        )
        (?:.|[\n\r]){0,160}?
        (?:
          clientSecret
          | client_secret
        )
      )
      (?:.|[\n\r]){0,16}?
      (?:
        =
        |
        :
        |
        =>
      )
      \s*
      ["']?
      (
        [A-Z0-9_~.+/=-]{24,128}
      )
      (?: ["'\s,;}&\]] | $ )
    pattern_requirements:
      min_digits: 1
      min_uppercase: 1
      min_lowercase: 1
      ignore_if_contains:
        - changeme
        - example
        - placeholder
        - your_client_secret
        - your-secret
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'AZURE_CLIENT_SECRET="mZ8Q~V4x2pL7nR5sT9uW3yA6bC1dE0fG"'
      - 'ENTRA_APP_SECRET: 4Px7_kQ2mN9vR3tY6wA8cD1eF5gH0jLs'
      - |
        {
          "appId": "12345678-90ab-4cde-8f01-234567890abc",
          "password": "N7vX2pQ9_rT4mL6sK8wC3dF5gH1jA0bZ",
          "tenant": "11111111-2222-4333-8444-555555555555"
        }
    validation:
      type: Http
      content:
        request:
          method: POST
          url: "https://login.microsoftonline.com/{{ AZURE_TENANT_ID }}/oauth2/v2.0/token"
          headers:
            Content-Type: application/x-www-form-urlencoded
          body: "client_id={{ AZURE_CLIENT_ID | url_encode }}&client_secret={{ TOKEN | url_encode }}&scope=https%3A%2F%2Fgraph.microsoft.com%2F.default&grant_type=client_credentials"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"access_token"'
    depends_on_rule:
      - rule_id: kingfisher.azure.7
        variable: AZURE_TENANT_ID
      - rule_id: kingfisher.azure.8
        variable: AZURE_CLIENT_ID
    references:
      - https://learn.microsoft.com/en-us/entra/identity-platform/v2-oauth2-client-creds-grant-flow
      - https://learn.microsoft.com/en-us/cli/azure/ad/sp#az-ad-sp-create-for-rbac

  - name: Microsoft Entra or Azure OAuth2 Access Token
    id: kingfisher.azure.10
    pattern: |
      (?xi)
      \b
      (?:
        AZURE[\s._-]*ACCESS[\s._-]*TOKEN
        | ARM[\s._-]*ACCESS[\s._-]*TOKEN
        | ENTRA[\s._-]*ACCESS[\s._-]*TOKEN
        | MS[\s._-]*GRAPH[\s._-]*TOKEN
        | MICROSOFT[\s._-]*GRAPH[\s._-]*TOKEN
        | GRAPH[\s._-]*ACCESS[\s._-]*TOKEN
      )
      (?:.|[\n\r]){0,16}?
      (?: = | : | => )
      \s*
      ["']?
      (
        ey[A-Z0-9_-]{12,}
        \.
        ey[A-Z0-9_-]{12,}
        \.
        [A-Z0-9_-]{24,}
      )
      (?: ["'\s,;}&\]] | $ )
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'MS_GRAPH_TOKEN=eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJhdWQiOiJodHRwczovL2dyYXBoLm1pY3Jvc29mdC5jb20iLCJ0aWQiOiI3MmY5ODhiZi04NmYxLTQxYWYtOTFhYi0yZDdjZDAxMWRiNDciLCJvaWQiOiIxMTExMTExMS0yMjIyLTQzMzMtODQ0NC01NTU1NTU1NTU1NTUiLCJpZHR5cCI6ImFwcCIsInJvbGVzIjpbIlVzZXIuUmVhZC5BbGwiXX0.YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXowMTIzNDU2Nzg5'
      - 'AZURE_ACCESS_TOKEN: eyJhbGciOiJSUzI1NiJ9.eyJhdWQiOiJodHRwczovL21hbmFnZW1lbnQuYXp1cmUuY29tLyIsInRpZCI6ImFhYWFhYWFhLWJiYmItNGNjYy04ZGRkLWVlZWVlZWVlZWVlZSIsIm9pZCI6IjEyMzQ1Njc4LTkwYWItNGNkZS04ZjAxLTIzNDU2Nzg5MGFiYyJ9.c2lnbmF0dXJlX2J5dGVzX2Zvcl9leGFtcGxlX29ubHkxMjM0NTY'
    validation:
      type: JWT
    references:
      - https://learn.microsoft.com/en-us/entra/identity-platform/access-token-claims-reference
      - https://learn.microsoft.com/en-us/entra/identity-platform/scopes-oidc
